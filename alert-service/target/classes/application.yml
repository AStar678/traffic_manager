server:
  port: 8096

spring:
  application:
    name: alert-service
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:25}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          ssl:
            enable: ${MAIL_SMTP_SSL:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}
            required: ${MAIL_SMTP_STARTTLS_REQUIRED:true}

alert:
  email:
    enabled: ${ALERT_EMAIL_ENABLED:true}
    from: ${ALERT_EMAIL_FROM:${MAIL_USERNAME:}}
    recipients: ${ALERT_EMAIL_RECIPIENTS:}
  api:
    token: ${ALERT_API_TOKEN:}
