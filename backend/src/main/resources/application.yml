server:
  port: 8080

spring:
  application:
    name: vision-drive-backend

  # 默认使用 H2；通过 DB_* 环境变量切换到云端 MySQL。
  datasource:
    url: ${DB_URL:jdbc:h2:file:./data/visiondrive;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=USER}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console

  # JPA
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    database-platform: ${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
    properties:
      hibernate:
        format_sql: true
  # 文件上传
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 220MB

# 三个独立算法服务地址
algorithm:
  license:
    base-url: ${LICENSE_ALGORITHM_BASE_URL:http://localhost:8000}
  police:
    base-url: ${POLICE_ALGORITHM_BASE_URL:http://localhost:8001}
  gesture:
    base-url: ${GESTURE_ALGORITHM_BASE_URL:http://100.73.64.55:8002}
  vehicle:
    base-url: ${VEHICLE_ALGORITHM_BASE_URL:http://localhost:8004}
  inference:
    image: /api/v1/inference/image

# 主服务内置三路摄像头管理。帧目录与车牌/交警算法进程共享，只传递文件路径。
camera:
  state-file: ${CAMERA_STATE_FILE:./data/camera-slots.json}
  source-dir: ${CAMERA_SOURCE_DIR:./uploads/camera-sources}
  frame-dir: ${CAMERA_FRAME_DIR:./uploads/camera-frames}
  ffmpeg-bin: ${CAMERA_FFMPEG_BIN:ffmpeg}
  sandbox-base-url: ${SANDBOX_RTSP_BASE_URL:rtsp://10.126.59.120:8554/live}

# JWT
jwt:
  secret: ${JWT_SECRET:visiondrive-development-jwt-secret-change-before-production-2026}
  expiration: 7200000  # 2小时
  refresh-expiration: 604800000  # 7天

# 登录/注册请求使用 RSA-OAEP + AES-GCM 混合加密。生产环境必须配置持久化 PKCS#8 私钥。
auth:
  payload-encryption:
    private-key-path: ${AUTH_ENCRYPTION_PRIVATE_KEY_PATH:}

# 仅首次迁移时显式开启；默认绝不重复导入。
migration:
  h2:
    enabled: ${MIGRATE_H2_ENABLED:false}
    url: ${MIGRATE_H2_URL:jdbc:h2:file:./data/visiondrive;DB_CLOSE_ON_EXIT=FALSE}

# 短信验证码：开发环境默认使用 Mock；正式环境设置 SMS_PROVIDER=aliyun 并配置密钥。
sms:
  provider: ${SMS_PROVIDER:mock}
  expose-mock-code: ${SMS_EXPOSE_MOCK_CODE:true}
  aliyun:
    region-id: ${ALIYUN_REGION_ID:cn-hangzhou}
    access-key-id: ${ALIYUN_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:}
    sign-name: ${ALIYUN_SMS_SIGN_NAME:}
    template-code: ${ALIYUN_SMS_TEMPLATE_CODE:}

# 文件服务。生产环境配置公网地址后，千问可直接拉取较大的失败视频；本地小文件自动使用 Base64。
file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}
  public-base-url: ${FILE_PUBLIC_BASE_URL:}

# 阿里云百炼 / 千问 API
llm:
  provider: qwen
  api-key: ${DASHSCOPE_API_KEY:${LLM_API_KEY:}}
  model: ${QWEN_TEXT_MODEL:qwen-plus}
  vision-model: ${QWEN_VISION_MODEL:qwen-vl-plus}
  base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
  vision-max-base64-bytes: ${QWEN_VISION_MAX_BASE64_BYTES:7340032}

# 告警Agent
alert:
  agent:
    enabled: ${ALERT_AGENT_ENABLED:true}
    poll-interval: 30000  # 轮询间隔(毫秒)
    cooldown: ${ALERT_AGENT_COOLDOWN:300000}  # 同类告警冷却时间(毫秒)
    failure-rate-threshold: 0.3
    low-confidence-threshold: 0.5
    recognition-review-enabled: ${RECOGNITION_REVIEW_ENABLED:true}
    recognition-review-cooldown: ${RECOGNITION_REVIEW_COOLDOWN:60000}
    token-limit: 1000000
  report:
    enabled: ${ALERT_SERVICE_ENABLED:true}
    base-url: ${ALERT_SERVICE_BASE_URL:http://localhost:8096}
    token: ${ALERT_SERVICE_TOKEN:}
  evidence-proxy:
    allowed-hosts: ${EVIDENCE_PROXY_ALLOWED_HOSTS:localhost,127.0.0.1,::1}
