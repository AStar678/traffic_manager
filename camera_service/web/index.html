<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>VisionDrive 摄像头管理</title>
  <style>
    :root {
      --bg: #080c14;
      --surface: #101725;
      --panel: #161d2b;
      --panel-2: #1c2434;
      --border: rgba(255, 255, 255, 0.09);
      --border-active: rgba(0, 180, 216, 0.42);
      --primary: #00b4d8;
      --success: #00e676;
      --warning: #ffab00;
      --danger: #ff3d00;
      --text: #eef2f7;
      --muted: #92a0b8;
      --dim: #586680;
      --shadow: 0 12px 36px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    [hidden] {
      display: none !important;
    }

    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "SF Pro Display", "PingFang SC", "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
    }

    body { overflow: hidden; }

    button, input, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      height: 50px;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      background: rgba(8, 12, 20, 0.94);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--primary);
      color: #080c14;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.5px;
      flex: 0 0 auto;
    }

    .brand strong {
      display: block;
      font-size: 16px;
      line-height: 1.1;
    }

    .brand span {
      display: block;
      margin-top: 3px;
      font-size: 12px;
      color: var(--muted);
    }

    .service-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 30px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.03);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .status-light {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--warning);
      box-shadow: 0 0 12px rgba(255, 171, 0, 0.35);
    }

    .status-light.ready {
      background: var(--success);
      box-shadow: 0 0 12px rgba(0, 230, 118, 0.35);
    }

    .status-light.offline {
      background: var(--danger);
      box-shadow: 0 0 12px rgba(255, 61, 0, 0.35);
    }

    .content {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 12px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 12px;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .main-column,
    .side-column {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
    }

    .side-column {
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
    }

    .side-column .panel:first-child {
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .panel-head {
      min-height: 46px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .panel-title {
      min-width: 0;
    }

    .panel-title h1,
    .panel-title h2 {
      margin: 0;
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
      line-height: 1.2;
    }

    .panel-title p {
      margin: 3px 0 0;
      color: var(--dim);
      font-size: 11px;
      line-height: 1.45;
    }

    .preview-wrap {
      position: relative;
      height: min(36vh, 320px);
      min-height: 260px;
      background: #070b12;
      overflow: hidden;
      border-radius: 0 0 14px 14px;
    }

    .preview {
      width: 100%;
      height: 100%;
      min-height: 260px;
      display: block;
      object-fit: contain;
      background: #070b12;
    }

    .browser-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0.01;
      pointer-events: none;
      z-index: 0;
    }

    .browser-video.visible {
      opacity: 1;
      z-index: 2;
      background: #070b12;
    }

    .preview { position: relative; z-index: 1; }

    .preview-empty {
      height: 100%;
      min-height: 260px;
      display: grid;
      place-items: center;
      color: var(--dim);
      text-align: center;
      padding: 24px;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 42px 42px;
    }

    .preview-empty strong {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 15px;
    }

    .preview-badge {
      position: absolute;
      top: 14px;
      left: 14px;
      max-width: calc(100% - 28px);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 9px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      backdrop-filter: blur(8px);
    }

    .chip.live {
      color: var(--danger);
      border-color: rgba(255, 61, 0, 0.35);
    }

    .toolbar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .btn {
      min-height: 32px;
      padding: 0 11px;
      border-radius: 10px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 12px;
      font-weight: 800;
      transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
    }

    .btn:hover {
      border-color: var(--border-active);
      transform: translateY(-1px);
    }

    .btn.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #080c14;
    }

    .btn.danger {
      color: var(--danger);
      border-color: rgba(255, 61, 0, 0.24);
      background: rgba(255, 61, 0, 0.07);
    }

    .btn:disabled {
      opacity: 0.48;
      cursor: not-allowed;
      transform: none;
    }

    .source-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      max-height: 100%;
      min-height: 0;
      flex: 1;
      overflow: auto;
    }

    .source-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      padding: 9px;
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid transparent;
      border-radius: 10px;
      transition: border-color 160ms ease, background 160ms ease;
    }

    .source-row.active {
      border-color: var(--border-active);
      background: rgba(0, 180, 216, 0.07);
    }

    .source-name {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .source-name strong {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }

    .source-meta {
      margin-top: 6px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 5px;
      color: var(--dim);
      font-size: 10px;
      line-height: 1.3;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 20px;
      padding: 0 7px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.055);
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .tag.active {
      background: rgba(0, 230, 118, 0.10);
      color: var(--success);
    }

    .source-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .form {
      padding: 12px;
      display: grid;
      gap: 9px;
    }

    .field {
      display: grid;
      gap: 5px;
    }

    .field label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    .input,
    .select {
      width: 100%;
      min-height: 34px;
      padding: 0 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      outline: none;
    }

    .input:focus,
    .select:focus {
      border-color: var(--border-active);
    }

    .inline-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .switch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .switch-row input {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
    }

    .message {
      min-height: 32px;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.035);
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .message.error {
      color: #ffb199;
      background: rgba(255, 61, 0, 0.08);
      border: 1px solid rgba(255, 61, 0, 0.18);
    }

    .message.success {
      color: var(--success);
      background: rgba(0, 230, 118, 0.07);
      border: 1px solid rgba(0, 230, 118, 0.16);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 10px;
    }

    .stat {
      padding: 10px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid var(--border);
    }

    .stat span {
      display: block;
      color: var(--dim);
      font-size: 10px;
      font-weight: 800;
    }

    .stat strong {
      display: block;
      margin-top: 3px;
      font-size: 15px;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .footer-note {
      padding: 0 12px 10px;
      color: var(--dim);
      font-size: 11px;
    }

    @media (max-width: 980px) {
      .content {
        grid-template-columns: 1fr;
        overflow: auto;
      }

      .source-list {
        max-height: none;
      }

      body,
      .app {
        overflow: auto;
        height: auto;
        min-height: 100vh;
      }

      .side-column {
        display: flex;
      }
    }

    @media (max-width: 640px) {
      .topbar {
        height: auto;
        min-height: 58px;
        align-items: flex-start;
        flex-direction: column;
        gap: 10px;
        padding: 14px;
      }

      .content {
        padding: 12px;
      }

      .panel-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .toolbar,
      .source-actions {
        width: 100%;
      }

      .source-row {
        grid-template-columns: 1fr;
      }

      .btn {
        flex: 1;
      }

      .stats,
      .inline-fields {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">VC</div>
        <div>
          <strong>虚拟摄像头管理</strong>
          <span>独立服务 · WebRTC 预览 · PNG/JPEG 抓拍</span>
        </div>
      </div>
      <div class="service-status">
        <span id="statusLight" class="status-light"></span>
        <span id="serviceStatus">正在连接服务</span>
      </div>
    </header>

    <main class="content">
      <section class="main-column">
        <div class="panel">
          <div class="panel-head">
            <div class="panel-title">
              <h1>实时预览</h1>
              <p id="activeDetail">尚未选择摄像头源</p>
            </div>
            <div class="toolbar">
              <button id="startBrowserCameraBtn" class="btn primary">启动摄像头</button>
              <button id="stopBrowserCameraBtn" class="btn" disabled>停止摄像头</button>
              <button id="refreshBtn" class="btn">刷新</button>
              <button id="snapshotBtn" class="btn">打开截图</button>
              <button id="copySnapshotBtn" class="btn primary">复制截图地址</button>
            </div>
          </div>
          <div class="preview-wrap">
            <video id="browserVideo" class="browser-video" autoplay playsinline muted aria-hidden="true"></video>
            <video id="preview" class="preview" autoplay playsinline muted hidden></video>
            <img id="previewFallback" class="preview" alt="摄像头兼容预览" decoding="async" hidden>
            <div id="previewEmpty" class="preview-empty">
              <div>
                <strong>等待摄像头源</strong>
                <span>选择一个源后会显示实时画面</span>
              </div>
            </div>
            <div class="preview-badge">
              <span class="chip live">LIVE</span>
              <span id="previewChip" class="chip">未连接</span>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <div class="panel-title">
              <h2>服务概览</h2>
              <p>当前活动源和源数量来自摄像头微服务运行时状态</p>
            </div>
          </div>
          <div class="stats">
            <div class="stat">
              <span>源数量</span>
              <strong id="sourceCount">--</strong>
            </div>
            <div class="stat">
              <span>活动源</span>
              <strong id="activeSourceId">--</strong>
            </div>
            <div class="stat">
              <span>服务地址</span>
              <strong id="serviceOrigin">--</strong>
            </div>
          </div>
          <div class="footer-note">主系统前端只消费摄像头服务的流和截图地址；这个管理台独立托管在摄像头微服务内。</div>
        </div>
      </section>

      <aside class="side-column">
        <div class="panel">
          <div class="panel-head">
            <div class="panel-title">
              <h2>摄像头源</h2>
              <p>切换后所有消费者会读取新的活动源</p>
            </div>
          </div>
          <div id="sourceList" class="source-list"></div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <div class="panel-title">
              <h2>添加自定义源</h2>
              <p>支持本机设备编号、图片路径或视频路径</p>
            </div>
          </div>
          <form id="sourceForm" class="form">
            <div class="field">
              <label for="sourceType">源类型</label>
              <select id="sourceType" class="select">
                <option value="image">图片文件</option>
                <option value="video">视频文件</option>
                <option value="device">OpenCV 设备编号（备用）</option>
              </select>
            </div>
            <div class="field">
              <label for="sourceName">显示名称</label>
              <input id="sourceName" class="input" placeholder="例如：车内手势测试源">
            </div>
            <div id="pathField" class="field">
              <label for="sourcePath">本机文件路径</label>
              <input id="sourcePath" class="input" placeholder="/Users/.../sample.mp4">
            </div>
            <div id="deviceField" class="field" hidden>
              <label for="deviceIndex">设备编号</label>
              <input id="deviceIndex" class="input" type="number" min="0" value="0">
            </div>
            <div class="inline-fields">
              <div class="field">
                <label for="sourceFps">帧率</label>
                <input id="sourceFps" class="input" type="number" min="1" max="30" value="8">
              </div>
              <label class="switch-row">
                <span>视频循环</span>
                <input id="sourceLoop" type="checkbox" checked>
              </label>
            </div>
            <button class="btn primary" type="submit">添加并启用</button>
            <div id="message" class="message">推荐使用“启动摄像头”由浏览器授权推流；图片源会自动等比补边到 16:9。</div>
          </form>
        </div>
      </aside>
    </main>
  </div>

  <script>
    const ADMIN_PREVIEW_FPS = 15;
    const ADMIN_VIDEO_PREVIEW_FPS = 10;
    const ADMIN_VIDEO_PREVIEW_QUALITY = 82;
    const BROWSER_UPLOAD_WIDTH = 1280;
    const BROWSER_UPLOAD_HEIGHT = 720;
    const WEBRTC_ICE_TIMEOUT_MS = 2500;
    const BROWSER_FIRST_FRAME_TIMEOUT_MS = 7000;
    const REQUEST_TIMEOUT_MS = 8000;
    const SWITCH_TIMEOUT_MS = 2500;
    const SWITCH_RECOVERY_MS = 3500;
    const state = {
      sources: [],
      activeSourceId: '',
      streamVersion: Date.now(),
      previewSourceId: '',
      previewMode: '',
      previewVersion: 0,
      activationBusy: false,
      pendingSourceId: '',
      switchingSourceId: '',
      activationSeq: 0,
      activeSwitchController: null,
      switchRecoveryTimer: null,
      browserStream: null,
      browserStreaming: false,
      previewPc: null,
      previewStream: null,
      previewStarting: false,
      publishPc: null,
    };

    const els = {
      statusLight: document.getElementById('statusLight'),
      serviceStatus: document.getElementById('serviceStatus'),
      sourceList: document.getElementById('sourceList'),
      preview: document.getElementById('preview'),
      previewEmpty: document.getElementById('previewEmpty'),
      previewChip: document.getElementById('previewChip'),
      activeDetail: document.getElementById('activeDetail'),
      sourceCount: document.getElementById('sourceCount'),
      activeSourceId: document.getElementById('activeSourceId'),
      serviceOrigin: document.getElementById('serviceOrigin'),
      startBrowserCameraBtn: document.getElementById('startBrowserCameraBtn'),
      stopBrowserCameraBtn: document.getElementById('stopBrowserCameraBtn'),
      refreshBtn: document.getElementById('refreshBtn'),
      snapshotBtn: document.getElementById('snapshotBtn'),
      copySnapshotBtn: document.getElementById('copySnapshotBtn'),
      browserVideo: document.getElementById('browserVideo'),
      previewFallback: document.getElementById('previewFallback'),
      form: document.getElementById('sourceForm'),
      sourceType: document.getElementById('sourceType'),
      sourceName: document.getElementById('sourceName'),
      sourcePath: document.getElementById('sourcePath'),
      deviceIndex: document.getElementById('deviceIndex'),
      sourceFps: document.getElementById('sourceFps'),
      sourceLoop: document.getElementById('sourceLoop'),
      pathField: document.getElementById('pathField'),
      deviceField: document.getElementById('deviceField'),
      message: document.getElementById('message'),
    };

    els.serviceOrigin.textContent = location.origin;

    async function api(path, options = {}, timeoutMs = REQUEST_TIMEOUT_MS) {
      const controller = new AbortController();
      const externalSignal = options.signal;
      const abortFromExternal = () => controller.abort();
      if (externalSignal?.aborted) {
        controller.abort();
      } else if (externalSignal) {
        externalSignal.addEventListener('abort', abortFromExternal, { once: true });
      }
      const timeout = window.setTimeout(() => controller.abort(), timeoutMs);
      const { headers, signal, ...fetchOptions } = options;
      try {
        const response = await fetch(path, {
          ...fetchOptions,
          headers: { 'Content-Type': 'application/json', ...(headers || {}) },
          signal: controller.signal,
        });
        const text = await response.text();
        const body = text ? JSON.parse(text) : {};
        if (!response.ok) {
          throw new Error(body.detail || body.message || `请求失败：${response.status}`);
        }
        return body.data || body;
      } catch (error) {
        if (error.name === 'AbortError') {
          throw new Error(externalSignal?.aborted ? '请求已取消' : '请求超时，请稍后重试');
        }
        throw error;
      } finally {
        window.clearTimeout(timeout);
        externalSignal?.removeEventListener('abort', abortFromExternal);
      }
    }

    function setMessage(text, kind = '') {
      els.message.textContent = text;
      els.message.className = `message ${kind}`.trim();
    }

    function setServiceStatus(text, status) {
      els.serviceStatus.textContent = text;
      els.statusLight.className = `status-light ${status || ''}`.trim();
    }

    function stopPreviewStream() {
      state.previewSourceId = '';
      state.previewMode = '';
      state.previewVersion = 0;
      closePreviewPeer();
      els.preview.hidden = true;
      els.preview.srcObject = null;
      stopFallbackPreview();
    }

    async function startPreviewStream(sourceId) {
      if (!window.RTCPeerConnection) {
        throw new Error('当前浏览器不支持 WebRTC 视频预览');
      }
      closePreviewPeer();
      const pc = new RTCPeerConnection({ iceServers: [] });
      const stream = new MediaStream();
      state.previewPc = pc;
      state.previewStream = stream;
      els.preview.srcObject = stream;
      pc.addTransceiver('video', { direction: 'recvonly' });
      pc.ontrack = event => {
        const incoming = event.streams?.[0] || stream;
        if (!event.streams?.length) {
          incoming.addTrack(event.track);
        }
        state.previewStream = incoming;
        els.preview.srcObject = incoming;
        els.preview.hidden = false;
        els.preview.play().catch(() => {});
      };
      pc.onconnectionstatechange = () => {
        if (['failed', 'disconnected'].includes(pc.connectionState)) {
          setMessage('WebRTC 预览连接已断开，请刷新重连', 'error');
        }
      };
      await negotiateWebRtc(pc, '/api/v1/cameras/webrtc/offer', {
        sourceId,
        fps: ADMIN_PREVIEW_FPS,
      });
      els.preview.hidden = false;
      stopFallbackPreview();
      await els.preview.play().catch(() => {});
    }

    function startImagePreview(source) {
      const params = new URLSearchParams({
        sourceId: source.id,
        t: String(state.streamVersion || Date.now()),
      });
      closePreviewPeer();
      els.preview.hidden = true;
      els.preview.srcObject = null;
      els.previewFallback.src = `/api/v1/cameras/snapshot.jpg?${params.toString()}`;
      els.previewFallback.hidden = false;
    }

    function startMjpegPreview(source) {
      const sourceId = typeof source === 'string' ? source : source.id;
      const params = new URLSearchParams({
        sourceId,
        fps: String(ADMIN_VIDEO_PREVIEW_FPS),
        preview: '1',
        quality: String(ADMIN_VIDEO_PREVIEW_QUALITY),
        t: String(Date.now()),
      });
      closePreviewPeer();
      els.preview.hidden = true;
      els.preview.srcObject = null;
      els.previewFallback.src = `/api/v1/cameras/stream.mjpg?${params.toString()}`;
      els.previewFallback.hidden = false;
    }

    function stopFallbackPreview() {
      els.previewFallback.hidden = true;
      els.previewFallback.removeAttribute('src');
    }

    async function publishBrowserStream(sourceId, stream) {
      if (!window.RTCPeerConnection) {
        throw new Error('当前浏览器不支持 WebRTC 摄像头推流');
      }
      closePublishPeer();
      const pc = new RTCPeerConnection({ iceServers: [] });
      state.publishPc = pc;
      stream.getVideoTracks().forEach(track => pc.addTrack(track, stream));
      pc.onconnectionstatechange = () => {
        if (['failed', 'disconnected'].includes(pc.connectionState)) {
          setMessage('浏览器摄像头 WebRTC 推流已断开，请重新启动', 'error');
        }
      };
      await negotiateWebRtc(pc, '/api/v1/cameras/webrtc/publish', {
        sourceId,
        fps: ADMIN_PREVIEW_FPS,
      });
    }

    async function negotiateWebRtc(pc, path, payload) {
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      await waitForIceGatheringComplete(pc);
      const answer = await api(path, {
        method: 'POST',
        body: JSON.stringify({
          ...payload,
          sdp: pc.localDescription.sdp,
          type: pc.localDescription.type,
        }),
      }, 15000);
      await pc.setRemoteDescription(new RTCSessionDescription(answer));
      return answer;
    }

    function waitForIceGatheringComplete(pc) {
      if (pc.iceGatheringState === 'complete') return Promise.resolve();
      return new Promise(resolve => {
        const timeout = window.setTimeout(done, WEBRTC_ICE_TIMEOUT_MS);
        function done() {
          window.clearTimeout(timeout);
          pc.removeEventListener('icegatheringstatechange', onStateChange);
          resolve();
        }
        function onStateChange() {
          if (pc.iceGatheringState === 'complete') done();
        }
        pc.addEventListener('icegatheringstatechange', onStateChange);
      });
    }

    function closePreviewPeer() {
      state.previewStarting = false;
      if (state.previewPc) {
        state.previewPc.ontrack = null;
        state.previewPc.onconnectionstatechange = null;
        state.previewPc.close();
        state.previewPc = null;
      }
      if (state.previewStream) {
        state.previewStream.getTracks().forEach(track => track.stop());
        state.previewStream = null;
      }
    }

    function closePublishPeer() {
      if (state.publishPc) {
        state.publishPc.onconnectionstatechange = null;
        state.publishPc.close();
        state.publishPc = null;
      }
    }

    function snapshotUrl(sourceId) {
      const params = new URLSearchParams({ sourceId, t: String(Date.now()) });
      return `${location.origin}/api/v1/cameras/snapshot.jpg?${params.toString()}`;
    }

    function activeSource() {
      return state.sources.find(source => source.id === state.activeSourceId) || null;
    }

    function browserSource() {
      return state.sources.find(source => source.sourceType === 'browser' || source.id === 'browser-camera') || null;
    }

    function isBrowserSource(source) {
      return Boolean(source && (source.sourceType === 'browser' || source.id === 'browser-camera'));
    }

    function previewModeForSource(source) {
      if (!source) return '';
      if (isBrowserSource(source) && state.browserStreaming) return 'local-browser';
      if (source.sourceType === 'image') return 'image';
      if (source.sourceType === 'video') return 'mjpeg';
      return 'webrtc';
    }

    function updateBrowserButtons() {
      els.startBrowserCameraBtn.disabled = state.browserStreaming;
      els.stopBrowserCameraBtn.disabled = !state.browserStreaming;
    }

    async function loadSources() {
      try {
        const data = await api('/api/v1/cameras/sources');
        state.sources = data.sources || [];
        state.activeSourceId = data.activeSourceId || state.sources[0]?.id || '';
        if (state.switchingSourceId && state.activeSourceId === state.switchingSourceId) {
          clearSwitchState();
        }
        setServiceStatus('服务在线', 'ready');
        render();
      } catch (error) {
        setServiceStatus('服务离线', 'offline');
        setMessage(error.message, 'error');
      }
    }

    function clearSwitchState(sequence) {
      if (sequence !== undefined && sequence !== state.activationSeq) return;
      state.switchingSourceId = '';
      state.activationBusy = false;
      state.pendingSourceId = '';
      state.activeSwitchController = null;
      if (state.switchRecoveryTimer) {
        window.clearTimeout(state.switchRecoveryTimer);
        state.switchRecoveryTimer = null;
      }
    }

    function armSwitchRecovery(sourceId, sequence) {
      if (state.switchRecoveryTimer) {
        window.clearTimeout(state.switchRecoveryTimer);
      }
      state.switchRecoveryTimer = window.setTimeout(async () => {
        if (sequence !== state.activationSeq || state.switchingSourceId !== sourceId) return;
        clearSwitchState(sequence);
        setMessage('切换已提交，状态已自动恢复', 'success');
        await loadSources();
      }, SWITCH_RECOVERY_MS);
    }

    async function activateSource(sourceId) {
      const source = state.sources.find(item => item.id === sourceId);
      const sequence = ++state.activationSeq;
      if (state.activeSwitchController) {
        state.activeSwitchController.abort();
      }
      const controller = new AbortController();
      state.activeSwitchController = controller;
      state.switchingSourceId = sourceId;
      state.activationBusy = false;
      state.pendingSourceId = '';
      state.activeSourceId = sourceId;
      state.streamVersion = Date.now();
      stopPreviewStream();
      setMessage(`正在切换到：${source?.name || sourceId}`, '');
      render();
      armSwitchRecovery(sourceId, sequence);

      try {
        const data = await api('/api/v1/cameras/source', {
          method: 'POST',
          body: JSON.stringify({ sourceId }),
          signal: controller.signal,
        }, SWITCH_TIMEOUT_MS);
        if (sequence !== state.activationSeq) return;
        state.activeSourceId = data.activeSourceId;
        clearSwitchState(sequence);
        setMessage(`已切换到：${data.activeSource?.name || sourceId}`, 'success');
        render();
      } catch (error) {
        if (sequence !== state.activationSeq) return;
        clearSwitchState(sequence);
        if (error.message !== '请求已取消') {
          setMessage(error.message, 'error');
        }
        await loadSources();
        render();
      }
    }

    async function deleteSource(sourceId) {
      if (!confirm('确认删除这个自定义摄像头源？')) return;
      try {
        await api(`/api/v1/cameras/source/${encodeURIComponent(sourceId)}`, { method: 'DELETE' });
        state.streamVersion = Date.now();
        setMessage('自定义源已删除', 'success');
        await loadSources();
      } catch (error) {
        setMessage(error.message, 'error');
      }
    }

    function render() {
      const active = activeSource();
      els.sourceCount.textContent = String(state.sources.length);
      els.activeSourceId.textContent = state.activeSourceId || '--';
      els.activeDetail.textContent = active ? `${active.name} · ${active.sourceType}` : '尚未选择摄像头源';
      els.previewChip.textContent = active ? active.name : '未连接';
      const previewMode = previewModeForSource(active);
      const sourceChanged = active ? state.previewSourceId !== active.id : false;
      const modeChanged = state.previewMode !== previewMode;
      const versionChanged = state.previewVersion !== state.streamVersion;
      const previewChanged = sourceChanged || modeChanged || versionChanged;
      els.browserVideo.classList.toggle('visible', previewMode === 'local-browser');

      if (active) {
        els.previewEmpty.hidden = true;
        if (previewChanged) {
          state.previewSourceId = active.id;
          state.previewMode = previewMode;
          state.previewVersion = state.streamVersion;
        }

        if (previewMode === 'local-browser') {
          if (previewChanged) {
            closePreviewPeer();
            stopFallbackPreview();
          }
          els.preview.hidden = true;
          els.preview.srcObject = null;
        } else if (previewMode === 'image') {
          if (previewChanged || els.previewFallback.hidden) {
            startImagePreview(active);
          }
        } else if (previewMode === 'mjpeg') {
          if (previewChanged || els.previewFallback.hidden) {
            startMjpegPreview(active);
          }
        } else if (previewMode === 'webrtc') {
          if (previewChanged) {
            stopFallbackPreview();
            closePreviewPeer();
            els.preview.hidden = true;
            els.preview.srcObject = null;
          }
          if (!state.previewPc && !state.previewStarting) {
            state.previewStarting = true;
            startPreviewStream(active.id)
              .catch(error => {
                setMessage(`WebRTC 预览启动失败，已切换到兼容预览：${error.message}`, '');
                startMjpegPreview(active);
              })
              .finally(() => {
                state.previewStarting = false;
              });
          }
        }
      } else {
        els.preview.hidden = true;
        els.previewEmpty.hidden = false;
        els.browserVideo.classList.remove('visible');
        stopPreviewStream();
      }

      els.sourceList.innerHTML = state.sources.map(source => {
        const isActive = source.id === state.activeSourceId;
        const isBrowser = isBrowserSource(source);
        const pathOrDevice = isBrowser
          ? '浏览器授权后推流到微服务'
          : source.sourceType === 'device'
            ? `deviceIndex=${source.deviceIndex ?? 0}`
            : escapeHtml(source.path || '');
        const taskTypes = (source.taskTypes || []).map(type => `<span class="tag">${escapeHtml(type)}</span>`).join('');
        const deleteButton = source.builtIn
          ? ''
          : `<button class="btn danger" data-delete="${escapeAttr(source.id)}">删除</button>`;
        const isSwitching = source.id === state.switchingSourceId;
        const actionButton = isBrowser
          ? `<button class="btn primary" data-browser-source="${escapeAttr(source.id)}"${isActive && state.browserStreaming ? ' disabled' : ''}>${state.browserStreaming ? (isActive ? '已启用' : '启用') : '启动'}</button>`
          : `<button class="btn primary" data-activate="${escapeAttr(source.id)}">${isSwitching ? '切换中' : (isActive ? '重新启动' : '启用')}</button>`;
        return `
          <div class="source-row ${isActive ? 'active' : ''}">
            <div>
              <div class="source-name">
                <span class="tag ${isActive ? 'active' : ''}">${isActive ? 'ACTIVE' : source.sourceType}</span>
                <strong title="${escapeAttr(source.name)}">${escapeHtml(source.name)}</strong>
              </div>
              <div class="source-meta">
                <span>${escapeHtml(source.id)}</span>
                <span>${pathOrDevice}</span>
                ${source.builtIn ? '<span class="tag">built-in</span>' : '<span class="tag">custom</span>'}
                ${taskTypes}
              </div>
            </div>
            <div class="source-actions">
              ${actionButton}
              ${deleteButton}
            </div>
          </div>
        `;
      }).join('');

      els.sourceList.querySelectorAll('[data-activate]').forEach(button => {
        button.addEventListener('click', () => activateSource(button.dataset.activate));
      });
      els.sourceList.querySelectorAll('[data-browser-source]').forEach(button => {
        button.addEventListener('click', () => activateBrowserSource(button.dataset.browserSource));
      });
      els.sourceList.querySelectorAll('[data-delete]').forEach(button => {
        button.addEventListener('click', () => deleteSource(button.dataset.delete));
      });
      updateBrowserButtons();
    }

    async function activateBrowserSource(sourceId) {
      if (state.browserStreaming) {
        await activateSource(sourceId);
        return;
      }
      await startBrowserCamera();
    }

    async function startBrowserCamera() {
      const source = browserSource();
      if (!source) {
        setMessage('服务未提供浏览器摄像头源，请重启摄像头微服务', 'error');
        return;
      }
      if (!navigator.mediaDevices?.getUserMedia) {
        setMessage('当前浏览器不支持摄像头授权，请使用 Chrome、Edge 或 Safari 打开管理台', 'error');
        return;
      }

      try {
        stopBrowserCamera(false);
        setMessage('正在请求浏览器摄像头权限...', '');
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: false,
          video: {
            facingMode: 'user',
            width: { ideal: BROWSER_UPLOAD_WIDTH },
            height: { ideal: BROWSER_UPLOAD_HEIGHT },
            frameRate: { ideal: 15, max: 30 },
          },
        });
        state.browserStream = stream;
        state.browserStreaming = true;
        els.browserVideo.srcObject = stream;
        updateBrowserButtons();
        render();
        await els.browserVideo.play();
        setMessage('摄像头已授权，正在等待首帧...', '');
        await waitForBrowserVideoFrame(BROWSER_FIRST_FRAME_TIMEOUT_MS);

        await api('/api/v1/cameras/source', {
          method: 'POST',
          body: JSON.stringify({ sourceId: source.id }),
        });
        setMessage('正在建立 WebRTC 视频通道...', '');
        const uploadStartedAt = Date.now();
        await publishBrowserStream(source.id, stream);
        await waitForBrowserFrameCommit(source.id, uploadStartedAt);
        state.streamVersion = Date.now();
        setMessage('浏览器摄像头已启动，WebRTC 视频正在推送给摄像头微服务', 'success');
        updateBrowserButtons();
        await loadSources();
      } catch (error) {
        stopBrowserCamera(false);
        setMessage(`摄像头启动失败：${error.message}`, 'error');
      }
    }

    function stopBrowserCamera(showMessage = true) {
      closePublishPeer();
      if (state.browserStream) {
        state.browserStream.getTracks().forEach(track => track.stop());
        state.browserStream = null;
      }
      state.browserStreaming = false;
      els.browserVideo.srcObject = null;
      updateBrowserButtons();
      render();
      if (showMessage) {
        setMessage('浏览器摄像头 WebRTC 推流已停止，微服务会保留最后一帧直到切换源', 'success');
      }
    }

    function waitForBrowserVideoFrame(timeoutMs) {
      const video = els.browserVideo;
      const startedAt = Date.now();
      return new Promise((resolve, reject) => {
        let settled = false;
        let rafId = 0;
        let timeoutId = 0;

        const cleanup = () => {
          window.clearTimeout(timeoutId);
          window.cancelAnimationFrame(rafId);
          video.removeEventListener('loadedmetadata', check);
          video.removeEventListener('loadeddata', check);
          video.removeEventListener('canplay', check);
        };

        const finish = () => {
          if (settled) return;
          settled = true;
          cleanup();
          resolve();
        };

        const fail = () => {
          if (settled) return;
          settled = true;
          cleanup();
          reject(new Error('浏览器摄像头没有输出有效画面，请检查系统摄像头权限或是否被其他应用占用'));
        };

        const check = () => {
          if (video.readyState >= 2 && video.videoWidth > 0 && video.videoHeight > 0) {
            finish();
            return;
          }
          if (Date.now() - startedAt >= timeoutMs) {
            fail();
            return;
          }
          rafId = window.requestAnimationFrame(check);
        };

        if ('requestVideoFrameCallback' in video) {
          video.requestVideoFrameCallback(() => check());
        }
        video.addEventListener('loadedmetadata', check);
        video.addEventListener('loadeddata', check);
        video.addEventListener('canplay', check);
        timeoutId = window.setTimeout(fail, timeoutMs);
        check();
      });
    }

    async function waitForBrowserFrameCommit(sourceId, startedAt) {
      const timeoutMs = 2500;
      const deadline = Date.now() + timeoutMs;
      while (Date.now() < deadline) {
        const data = await api(`/api/v1/cameras/browser-frame-status?t=${Date.now()}`, {}, 1500);
        if (data.hasFrame && (data.timestampMs || 0) >= startedAt - 1000) {
          return;
        }
        await delay(120);
      }
      throw new Error('首帧已上传但微服务未读到新画面，请重新启动摄像头');
    }

    function delay(ms) {
      return new Promise(resolve => window.setTimeout(resolve, ms));
    }

    function refreshPreview() {
      state.streamVersion = Date.now();
      render();
    }

    async function submitSource(event) {
      event.preventDefault();
      const sourceType = els.sourceType.value;
      const payload = {
        sourceType,
        name: els.sourceName.value.trim() || null,
        fps: Number(els.sourceFps.value || 8),
        loop: els.sourceLoop.checked,
      };

      if (sourceType === 'device') {
        payload.deviceIndex = Number(els.deviceIndex.value || 0);
      } else {
        payload.path = els.sourcePath.value.trim();
      }

      try {
        const data = await api('/api/v1/cameras/source', {
          method: 'POST',
          body: JSON.stringify(payload),
        });
        state.activeSourceId = data.activeSourceId;
        state.streamVersion = Date.now();
        els.form.reset();
        els.sourceType.value = sourceType;
        updateFormVisibility();
        setMessage(`已添加并启用：${data.activeSource?.name || data.activeSourceId}`, 'success');
        await loadSources();
      } catch (error) {
        setMessage(error.message, 'error');
      }
    }

    function updateFormVisibility() {
      const isDevice = els.sourceType.value === 'device';
      els.pathField.hidden = isDevice;
      els.deviceField.hidden = !isDevice;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;',
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, '&#96;');
    }

    els.startBrowserCameraBtn.addEventListener('click', startBrowserCamera);
    els.stopBrowserCameraBtn.addEventListener('click', () => stopBrowserCamera(true));

    els.refreshBtn.addEventListener('click', () => {
      refreshPreview();
      loadSources();
    });

    els.snapshotBtn.addEventListener('click', () => {
      const active = activeSource();
      if (!active) return setMessage('请先选择一个摄像头源', 'error');
      window.open(snapshotUrl(active.id), '_blank', 'noopener,noreferrer');
    });

    els.copySnapshotBtn.addEventListener('click', async () => {
      const active = activeSource();
      if (!active) return setMessage('请先选择一个摄像头源', 'error');
      const url = snapshotUrl(active.id);
      try {
        await navigator.clipboard.writeText(url);
        setMessage('截图地址已复制，可直接作为算法 imageUrl 使用', 'success');
      } catch {
        setMessage(url, 'success');
      }
    });

    els.sourceType.addEventListener('change', updateFormVisibility);
    els.form.addEventListener('submit', submitSource);
    window.addEventListener('beforeunload', () => {
      closePreviewPeer();
      stopBrowserCamera(false);
    });

    updateFormVisibility();
    updateBrowserButtons();
    loadSources();
  </script>
</body>
</html>
